<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>每日情绪卡片</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="toast" class="toast"></div>

  <!-- ====== 首页 ====== -->
  <div id="cardPage" class="page hide">
    <!-- 加载中 -->
    <div class="loading" id="loadingView">加载中...</div>

    <!-- 未设置 -->
    <div class="empty" id="emptyState" style="display:none">
      <text class="empty-title">还没有设置</text>
      <text class="empty-desc">填写出生时间才能看到每日卡片</text>
      <button class="btn" onclick="showSetup()">去设置</button>
    </div>

    <!-- 卡片：Double-Bezel -->
    <div class="card-outer" id="cardView" style="display:none">
      <div class="card-inner">

        <text class="eyebrow">每日情绪</text>
        <text class="date" id="dateStr"></text>

        <div class="weather-block" id="weatherBlock">
          <text class="weather-icon-display" id="weatherIcon"></text>
          <div class="weather-stats">
            <text class="weather-temp" id="weatherTemp"></text>
            <text class="weather-desc" id="weatherDesc"></text>
          </div>
        </div>

        <!-- 24h -->
        <div class="hourly-scroll"><div class="hourly-list" id="hourlyList"></div></div>

        <!-- 七日 -->
        <div class="week-block">
          <text class="week-title">七日</text>
          <div class="week-scroll"><div class="week-list" id="weekList"></div></div>
        </div>

        <!-- 情绪正文 -->
        <div class="card-body"><text class="emotion" id="emotionDesc"></text></div>

        <!-- 时辰 -->
        <div class="card-section">
          <text class="section-label">时辰</text>
          <text class="section-value" id="shichenTip"></text>
        </div>

        <!-- 穿衣 -->
        <div class="card-section">
          <text class="section-label">穿衣</text>
          <text class="section-value" id="clothing"></text>
        </div>

        <!-- 推荐 -->
        <div class="card-section">
          <text class="section-label">推荐</text>
          <text class="section-value" id="recommendation"></text>
        </div>

        <div class="divider"></div>

        <div class="card-quote">
          <text class="classical" id="quoteClassical"></text>
          <text class="modern" id="quoteModern"></text>
          <text class="tie" id="quoteTie"></text>
        </div>

        <div class="card-footer">
          <text class="setup-link" onclick="showSetup()">调整设置或体质问卷</text>
        </div>

      </div>
    </div>
  </div>
